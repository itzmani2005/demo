<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spensa</title>

    <!-- FIX 1: Fonts and icons first, before any render -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #e63946;
            --accent-color: #f5f5f5;
        }
    }
    @layer base {
        body { font-family: 'Poppins', sans-serif; }
    }
    @layer utilities {
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #auth-loader {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 9999;
            transition: opacity 0.3s ease;
        }
        #auth-loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #e63946;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div id="auth-loader"><div class="spinner"></div></div>

    <div id="root"></div>

    <script type="module">
      import { initializeApp }                                        from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
      import { getAuth, onAuthStateChanged,
               signInWithEmailAndPassword,
               signInWithPopup, GoogleAuthProvider }                  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc, serverTimestamp }  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey:            "AIzaSyDjRDEimh4D10umN6FMlev5sflEUK4pY1U",
        authDomain:        "vaultify-v1.firebaseapp.com",
        projectId:         "vaultify-v1",
        storageBucket:     "vaultify-v1.firebasestorage.app",
        messagingSenderId: "746815711523",
        appId:             "1:746815711523:web:381b2b5c0b75f157cd4496",
        measurementId:     "G-HWT32W3H5J"
      };

      const app  = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db   = getFirestore(app);
      let authChecked = false;
      onAuthStateChanged(auth, (user) => {
        if (!authChecked) {
          authChecked = true;
          const loader = document.getElementById('auth-loader');
          if (user) {
            // Already signed in — skip the form entirely
            window.location.href = 'index.html';
          } else {
            // Not signed in — show the login form
            if (loader) loader.classList.add('hidden');
            renderLoginPage();
          }
        }
      });

      
      function showError(message) {
        
        const friendly = {
          'auth/user-not-found':       'No account found with this email.',
          'auth/wrong-password':       'Incorrect password. Please try again.',
          'auth/invalid-email':        'Please enter a valid email address.',
          'auth/too-many-requests':    'Too many attempts. Please try again later.',
          'auth/network-request-failed': 'Network error. Check your connection.',
          'auth/popup-closed-by-user': 'Sign-in popup was closed. Please try again.',
          'auth/cancelled-popup-request': 'Another sign-in is already in progress.',
          'auth/invalid-credential':   'Invalid email or password.',
        };
        
        const codeMatch = message.match(/\(([^)]+)\)/);
        const code = codeMatch ? codeMatch[1] : '';
        const display = friendly[code] || message;

        const errorDiv = document.getElementById('error-message');
        if (errorDiv) {
          errorDiv.textContent = display;
          errorDiv.classList.remove('hidden');
        }
      }

      function hideError() {
        const errorDiv = document.getElementById('error-message');
        if (errorDiv) errorDiv.classList.add('hidden');
      }

      function setButtonLoading(btnId, loading, defaultText) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        btn.disabled = loading;
        if (loading) {
          btn.innerHTML = '<div class="flex items-center justify-center gap-2"><div class="spinner" style="width:18px;height:18px;border-width:2px"></div><span>Please wait…</span></div>';
        } else {
          btn.innerHTML = defaultText;
        }
      }
      async function ensureUserProfile(user) {
        const userRef  = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) {
          await setDoc(userRef, {
            name:      user.displayName || '',
            email:     user.email       || '',
            createdAt: serverTimestamp(),
          });
        }
      }

      function redirectAfterLogin() {
        
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          if (user) {
            unsubscribe();
            window.location.href = 'index.html';
          }
        });
      }

      
      async function handleEmailLogin(email, password) {
        hideError();
        setButtonLoading('login-btn', true, 'Login');
        try {
          await signInWithEmailAndPassword(auth, email, password);
          
          redirectAfterLogin();
        } catch (error) {
          showError(error.message);
          setButtonLoading('login-btn', false, 'Login');
        }
      }

      
      async function handleGoogleLogin() {
        hideError();
        const googleLabel = '<svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg><span>Sign in with Google</span>';
        setButtonLoading('google-btn', true, googleLabel);
        try {
          const provider = new GoogleAuthProvider();
          const result   = await signInWithPopup(auth, provider);
          await ensureUserProfile(result.user);
          redirectAfterLogin();
        } catch (error) {
          showError(error.message);
          setButtonLoading('google-btn', false, googleLabel);
        }
      }

      
      function renderLoginPage() {
        const root = document.getElementById('root');
        root.innerHTML = `
          <div class="max-w-md w-full animate-fade-in">
            <div class="bg-white rounded-2xl p-8 shadow-2xl">

              <div class="flex items-center justify-center mb-6">
                <img src="https://app.trickle.so/storage/public/images/usr_173f09e758000001/227f35e7-5ab9-4689-9b04-01b138000659.png"
                     alt="Spensa Logo" class="w-20 h-20 object-contain">
              </div>

              <h1 class="text-3xl font-bold text-center mb-2">Welcome Back</h1>
              <p class="text-center text-gray-600 mb-8">Login to continue to Spensa</p>

              <div id="error-message" class="hidden bg-red-50 border-2 border-red-200 text-red-800 rounded-xl p-3 mb-4 text-sm"></div>

              <form id="login-form" class="space-y-4" novalidate>
                <div>
                  <label class="block text-sm font-medium mb-2" for="email">Email</label>
                  <input type="email" id="email" required autocomplete="email"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[var(--primary-color)] focus:outline-none transition-colors"
                    placeholder="Enter your email">
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2" for="password">Password</label>
                  <input type="password" id="password" required autocomplete="current-password"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[var(--primary-color)] focus:outline-none transition-colors"
                    placeholder="Enter your password">
                </div>

                <button type="submit" id="login-btn"
                  class="w-full px-6 py-3 bg-[var(--primary-color)] text-white rounded-xl font-medium shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-105 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:scale-100">
                  Login
                </button>
              </form>

              <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                  <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                  <span class="px-3 bg-white text-gray-500">Or continue with</span>
                </div>
              </div>

              <button id="google-btn"
                class="w-full px-6 py-3 bg-white border-2 border-gray-200 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
                <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Sign in with Google</span>
              </button>

              <p class="text-center text-sm text-gray-600 mt-6">
                Don't have an account?
                <a href="signup.html" class="text-[var(--primary-color)] font-medium hover:underline">Sign up</a>
              </p>
            </div>
          </div>
        `;

        document.getElementById('login-form').addEventListener('submit', (e) => {
          e.preventDefault();
          const email    = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          if (!email || !password) {
            showError('Please enter both email and password.');
            return;
          }
          handleEmailLogin(email, password);
        });

        document.getElementById('google-btn').addEventListener('click', handleGoogleLogin);
      }
    </script>
</body>
</html>
